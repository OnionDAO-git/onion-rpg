# Onion RPG — self-hosted target (game server + Postgres).
# Bring it up with the all-in-one script (handles secrets + env):
#   ./deploy/docker.sh
# or directly:
#   docker compose up -d --build
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orpg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orpg_dev}
      POSTGRES_DB: ${POSTGRES_DB:-orpg}
    volumes:
      - orpg-pg:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orpg} -d ${POSTGRES_DB:-orpg}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # All secrets / external API keys come from .env (ANTHROPIC_API_KEY,
    # ONION_*, BEACON_API_KEY, STT_*, ...). ./deploy/docker.sh creates it;
    # marked optional so the stack can also run from a pre-exported environment.
    env_file:
      - path: .env
        required: false
    environment:
      # Point at the compose Postgres service, overriding whatever DATABASE_URL
      # in .env targets for `bun dev` (localhost).
      DATABASE_URL: postgresql://${POSTGRES_USER:-orpg}:${POSTGRES_PASSWORD:-orpg_dev}@postgres:5432/${POSTGRES_DB:-orpg}
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  orpg-pg:
